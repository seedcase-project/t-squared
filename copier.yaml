_subdirectory: "template"

# Message to show after generating or regenerating the project successfully
_message_after_copy: |
  
  Your project "{{ github_repo }}" has been created successfully!  See the
  [guide](https://t-squared.seedcase-project.org/docs/guide) as well as the
  'TODO.md' file in the newly created project for more details on the next
  steps.

# Questions
is_seedcase_template:
  type: bool
  default: false
  help: "Is this new template from t-squared part of the Seedcase Project?"

github_user:
  type: str
  help: "What is the name of the GitHub user or organization where the template
    repository will be or is stored?"
  default: >-
    {{ "seedcase-project" if is_seedcase_template else "" }}

github_repo:
  type: str
  help: "What is the name of the GitHub repository where the template will be or
    is stored? We strongly recommend using the default given."
  default: "{{ _folder_name }}"

hosting_provider:
  type: str
  help: "What hosting provider will you use for the template?"
  choices:
    - netlify
    - gh-pages
  default: >-
    {{ "netlify" if is_seedcase_template else "gh-pages" }}

# Configurations not asked
github_repo_spec:
  type: str
  default: "{{ github_user }}/{{ github_repo }}"
  when: false

copyright_year:
  type: str
  default: "{{ copyright_year | default('%Y' | strftime) }}"
  when: false
